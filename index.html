<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f8f4f0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>FoodMile Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css"
    />
    <link rel="stylesheet" href="./styles.css?v=step11-room-engine" />
    <link rel="stylesheet" href="./visit-verification.css?v=step11-room-engine" />
    <link rel="stylesheet" href="./reward.css?v=step11-room-engine" />
    <link rel="stylesheet" href="./avatar.css?v=step11-room-engine" />
    <link rel="stylesheet" href="./room.css?v=step11-room-engine" />
  </head>
  <body>
    <main id="map" aria-label="MapLibre OpenFreeMap standard map"></main>
    <div id="selected-marker-indicator" class="selected-marker-indicator" aria-hidden="true"></div>
    <header class="app-top-shell" aria-label="FoodMile 지도 상단 메뉴">
      <div class="brand-header">
        <a class="brand-lockup" href="./" aria-label="FoodMile 홈">
          <span class="brand-pixel" aria-hidden="true"></span>
          <span class="brand-name">FoodMile</span>
        </a>
        <div class="header-actions" aria-label="빠른 메뉴">
          <button class="header-icon-button" type="button" aria-label="알림">
            <span class="pixel-bell" aria-hidden="true"></span>
          </button>
          <button class="header-icon-button" type="button" aria-label="메시지">
            <span class="pixel-chat" aria-hidden="true"></span>
          </button>
          <button class="profile-button" type="button" aria-label="프로필">
            <span class="pixel-avatar" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <section id="search-panel" class="search-panel" aria-label="지도 검색">
        <form id="search-form" class="search-form" role="search">
          <span class="search-leading-icon" aria-hidden="true"></span>
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="오늘 뭐 먹으러 갈까?"
            disabled
            autocomplete="off"
            enterkeyhint="search"
            aria-label="동 또는 가게 이름 검색"
            aria-controls="search-results"
            aria-expanded="false"
          />
          <span class="search-divider" aria-hidden="true"></span>
          <button class="search-submit" type="submit" aria-label="검색 필터">
            <span class="filter-glyph" aria-hidden="true"></span>
          </button>
        </form>
        <div id="search-results" class="search-results" role="listbox" hidden></div>
      </section>

      <nav id="category-panel" class="category-panel" aria-label="음식 카테고리"></nav>
    </header>
    <button id="back-button" class="back-button" type="button" title="이전 행정구역으로 돌아가기" disabled>
      ← 뒤로가기
    </button>

    <nav class="bottom-nav" aria-label="하단 내비게이션">
      <button class="bottom-nav-item is-active" type="button" aria-current="page" data-nav-target="map">
        <span class="nav-pixel nav-map" aria-hidden="true"></span>
        <span>지도</span>
      </button>
      <button class="bottom-nav-item" type="button" data-nav-target="verification">
        <span class="nav-pixel nav-camera" aria-hidden="true"></span>
        <span>인증</span>
      </button>
      <button class="bottom-nav-item" type="button" data-nav-target="minihome">
        <span class="nav-pixel nav-home" aria-hidden="true"></span>
        <span>미니홈</span>
      </button>
      <button class="bottom-nav-item" type="button" data-nav-target="feed">
        <span class="nav-pixel nav-feed" aria-hidden="true"></span>
        <span>피드</span>
      </button>
      <button class="bottom-nav-item" type="button" data-nav-target="profile">
        <span class="nav-pixel nav-profile" aria-hidden="true"></span>
        <span>프로필</span>
      </button>
    </nav>

    <button id="store-sheet-overlay" class="store-sheet-overlay" type="button" aria-label="가게 정보 닫기" tabindex="-1"></button>
    <section id="store-sheet" class="store-sheet" aria-label="가게 정보" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="store-sheet-handle" aria-hidden="true"></div>
      <button class="store-sheet-close" type="button" aria-label="가게 정보 닫기">×</button>
      <div id="store-sheet-content" class="store-sheet-content"></div>
    </section>

    <section class="status-panel" aria-label="map status" hidden>
      <strong>OpenFreeMap Liberty</strong>
      <span id="status">Loading map...</span>
    </section>

    <script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
    <script src="./geo.js?v=step11-room-engine"></script>
    <script src="./reward.constants.js?v=step11-room-engine"></script>
    <script src="./reward-engine.js?v=step11-room-engine"></script>
    <script src="./avatar.constants.js?v=step11-room-engine"></script>
    <script src="./avatar-engine.js?v=step11-room-engine"></script>
    <script src="./room.constants.js?v=step11-room-engine"></script>
    <script src="./room-engine.js?v=step11-room-engine"></script>
    <script src="./reward-ui.js?v=step11-room-engine"></script>
    <script src="./visit-verification.js?v=step11-room-engine"></script>
    <script src="./app.js?v=step11-room-engine"></script>
  </body>
</html>
